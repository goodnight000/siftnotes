<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>SiftNotes — Recording</title><link rel="stylesheet" href="./styles.css"></head>
<body>
<div class="win">
  <div class="titlebar">
    <div class="lights"><i class="r"></i><i class="y"></i><i class="g"></i></div>
    <div class="name">SiftNotes</div>
  </div>
  <div class="body">
    <nav class="rail">
      <div class="brand">S</div>
      <div class="ri active" title="Home"><svg viewBox="0 0 24 24"><path d="M3 11l9-7 9 7"/><path d="M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/><path d="M9 20v-6h6v6"/></svg></div>
      <div class="ri" title="Import audio"><svg viewBox="0 0 24 24"><path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M5 20h14"/></svg></div>
      <div class="spacer"></div>
      <div class="ri" title="Settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.5a1 1 0 0 0 .2 1.1l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.7.7v.2a2 2 0 1 1-4 0v-.1a1 1 0 0 0-1.7-.7l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1 1 0 0 0-.7-1.7H4a2 2 0 1 1 0-4h.1a1 1 0 0 0 .7-1.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1 1 0 0 0 1.7-.7V4a2 2 0 1 1 4 0v.1a1 1 0 0 0 1.7.7l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1 1 0 0 0-.2 1.1"/></svg></div>
    </nav>
    <div class="main">
      <div class="chev"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>
      <div class="stream">
        <div class="stream-inner">
          <div class="tline"><div class="tstamp">00:01</div><div class="ttext">什麼</div></div>
          <div class="tline"><div class="tstamp">00:03</div><div class="ttext">The objective for today's meeting is X, Y, and Z. We have to do X before we can do Y. Is this clear?</div></div>
          <div class="tline"><div class="tstamp">00:14</div><div class="ttext">Yes, that's clear. Let's start with the first item and work through them in order.</div></div>
          <div class="tline"><div class="tstamp">00:22</div><div class="ttext">Sounds good. I'll share my screen so everyone can follow along.</div></div>
        </div>
      </div>
      <div class="pillwrap">
        <div class="pill">
          <span class="live"></span>
          <span class="timer">00:24</span>
          <div class="recbtn square"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg></div>
          <div class="dots">⋯</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
